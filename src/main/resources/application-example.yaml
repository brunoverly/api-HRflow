spring:
  datasource:
    url: url_do_banco
    username: usuario_do_banco
    password: senha_do_banco

  jpa:
    show-sql: true

server:
  error:
    include-stacktrace: never

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

key:
  token-secret: secret_do_token

